<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - EL ASYELI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <section id="projects" class="py-20">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-4xl font-bold mb-16 text-slate-900">Tugas & <span class="text-[#b31312]">Proyek</span></h2>
            <div class="grid md:grid-cols-3 gap-8 text-left">
                <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                    <div class="w-16 h-16 bg-red-50 text-[#b31312] rounded-2xl flex items-center justify-center mb-6"><i data-lucide="layout"></i></div>
                    <h3 class="text-xl font-bold mb-4">Pengembangan Web</h3>
                    <p class="text-slate-500 text-sm">Pembuatan website portofolio interaktif yang responsif.</p>
                </div>
                <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                    <div class="w-16 h-16 bg-red-50 text-[#b31312] rounded-2xl flex items-center justify-center mb-6"><i data-lucide="code"></i></div>
                    <h3 class="text-xl font-bold mb-4">Logika Coding</h3>
                    <p class="text-slate-500 text-sm">Eksperimen algoritma dan penyelesaian masalah komputasi.</p>
                </div>
                <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                    <div class="w-16 h-16 bg-red-50 text-[#b31312] rounded-2xl flex items-center justify-center mb-6"><i data-lucide="palette"></i></div>
                    <h3 class="text-xl font-bold mb-4">Desain Digital</h3>
                    <p class="text-slate-500 text-sm">Visualisasi konten kreatif untuk media informatika.</p>
                </div>
            </div>
        </div>
    </section>
    <script>lucide.createIcons();</script>
</body>
</html>
